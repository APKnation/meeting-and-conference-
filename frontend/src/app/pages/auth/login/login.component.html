<div class="auth-container">
  <div class="auth-card">
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-subtitle">Sign in to your account</p>

    <form (ngSubmit)="f.form.valid && onSubmit()" #f="ngForm" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" [(ngModel)]="form.email" required #email="ngModel" class="form-control" />
        <div class="error-text" *ngIf="email.errors && f.submitted">
          Email is required
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" [(ngModel)]="form.password" required #password="ngModel" class="form-control" />
        <div class="error-text" *ngIf="password.errors && f.submitted">
          Password is required
        </div>
      </div>

      <div class="form-group">
        <button class="btn-primary btn-block" type="submit">Sign In</button>
      </div>

      <div class="error-text" *ngIf="isLoginFailed">
        {{ errorMessage }}
      </div>
    </form>
    
    <div class="auth-footer">
      Don't have an account? <a routerLink="/register">Sign up</a>
    </div>
  </div>
</div>
