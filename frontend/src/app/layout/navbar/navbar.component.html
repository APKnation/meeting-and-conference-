<nav class="navbar">
  <div class="navbar-brand">
    <a routerLink="/" class="brand-text">MeetingHub</a>
  </div>
  <div class="navbar-menu">
    <ng-container *ngIf="authService.currentUser | async as user; else guestLinks">
      <a *ngIf="user.role === 'ADMIN'" routerLink="/admin/dashboard" class="nav-link">Admin Dashboard</a>
      <a *ngIf="user.role === 'FACILITY_MANAGER'" routerLink="/fm/dashboard" class="nav-link">FM Dashboard</a>
      <a *ngIf="user.role === 'CUSTOMER'" routerLink="/customer/dashboard" class="nav-link">Dashboard</a>
      <a *ngIf="user.role === 'CUSTOMER'" routerLink="/customer/facilities" class="nav-link">Browse Facilities</a>
      
      <span class="nav-user">Welcome, {{ user.name }}</span>
      <button class="btn-logout" (click)="logout()">Logout</button>
    </ng-container>
    <ng-template #guestLinks>
      <a routerLink="/login" class="nav-link">Login</a>
      <a routerLink="/register" class="btn-primary">Sign Up</a>
    </ng-template>
  </div>
</nav>
